<div id="importOptionsModal" style="display:none;position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.55);align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:8px;padding:24px 28px;width:420px;max-width:95vw;box-shadow:0 12px 40px rgba(0,0,0,.25);font-family:Arial,sans-serif;">
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Options d'import
    </div>
    <div id="importSummaryText" style="font-size:12px;color:var(--muted);margin-bottom:18px;white-space:pre-line;line-height:1.6;background:var(--surface2);padding:10px 12px;border-radius:5px;border:1px solid var(--border);"></div>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);margin-bottom:20px;">
      <input type="checkbox" id="importResetPlanned" style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;">
      <span style="font-size:12px;color:var(--text);">Réinitialiser aussi la base planifiée <span style="color:var(--muted);font-size:11px;">(supprime les modifications utilisateurs)</span></span>
    </label>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="cancelImport()" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;">Annuler</button>
      <button onclick="confirmImport()" style="background:var(--accent);color:#fff;border:none;border-radius:5px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;">Confirmer l'import</button>
    </div>
  </div>
</div>

<div id="viewSuivi">
  <div class="suivi-layout">
    <!-- Sidebar -->
    <div class="suivi-sidebar">
      <div class="suivi-sidebar-header">
        <span class="suivi-sidebar-title">Clients</span>
        <div class="suivi-new-client-wrapper">
          <button class="suivi-btn-new" onclick="_suiviNewProject()">+ Nouveau</button>
          <div class="suivi-new-client-panel" id="suiviNewClientPanel" style="display:none">
            <input type="text" class="suivi-new-client-search" placeholder="Rechercher un client…"
              oninput="_suiviFilterNewClientList(this.value)">
            <div class="suivi-new-client-list" id="suiviNewClientList"></div>
          </div>
        </div>
      </div>
      <div class="suivi-project-list" id="suiviProjectList"></div>
    </div>

    <!-- Main -->
    <div class="suivi-main">
      <div class="suivi-topbar">
        <div class="suivi-title-dot" id="suiviTitleDot"></div>
        <input id="suiviTitleInput" type="text" class="suivi-title-input" placeholder="Aucun client sélectionné" readonly>

        </button>

          Notes
        </button>
        <button class="suivi-btn-historique" id="suiviBtnHistorique" onclick="_suiviOpenBacklogPanel()" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>

        </button>

        </button>
        <button class="suivi-btn-resume" id="suiviBtnResume" onclick="_suiviGenerateResume()" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="8" y1="9" x2="8" y2="9"/></svg>
          Résumer
        </button>
      </div>

      <div class="suivi-content">
        <!-- Empty state -->
        <div class="suivi-empty" id="suiviEmpty">
          <div class="suivi-empty-icon">📋</div>
          <h2>Aucun client sélectionné</h2>
          <p>Sélectionnez ou créez un client dans la barre latérale</p>
        </div>

        <!-- Project view -->
        <div id="suiviProjectView" style="display:none">
          <!-- Actions & alertes -->
          <div class="suivi-section">
            <div class="suivi-section-header">
              <span class="suivi-section-title">Suivi — Actions, Alertes &amp; Commentaires</span>
            </div>
            <div class="suivi-table-wrapper">
              <table class="suivi-table">
                <thead>
                  <tr>
                    <th class="suivi-col-num center">N°</th>
                    <th class="suivi-col-link"></th>
                    <th class="suivi-col-comment"></th>
                    <th class="suivi-col-backlog"></th>
                    <th class="suivi-col-type center">Type</th>
                    <th class="suivi-col-action">Contenu</th>
                    <th class="suivi-col-pers center">Responsable</th>
                    <th class="suivi-col-societe center">Société</th>
                    <th class="suivi-col-ech">Échéance</th>
                    <th class="suivi-col-statut center">Statut</th>
                    <th class="suivi-col-del"></th>

                </thead>
                <tbody id="suiviActionsTbody"></tbody>
              </table>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <button class="suivi-btn-add-row" onclick="_suiviAddAction()">+ Ajouter une ligne</button>
              <button class="suivi-btn-add-row suivi-btn-from-todo suivi-btn-from-todo-outline" onclick="_suiviOpenAddFromTodoPanel(this)">Depuis Todo</button>
            </div>
          </div>

          <!-- Interventions -->
          <div class="suivi-section" id="suiviIntvSection" style="display:none">
            <div class="suivi-section-header">
              <span class="suivi-section-title">Planning des interventions</span>
            </div>
            <div class="suivi-intv-table-wrapper">
              <table class="suivi-intv-table">
                <thead id="suiviIntvThead"></thead>
                <tbody id="suiviIntvTbody"></tbody>
              </table>
            </div>
            <button class="suivi-btn-add-row" onclick="_suiviAddIntvRow()">+ Ajouter une date</button>
          </div>
        </div>
      </div>
    </div>
